<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="طبق بارابول">
  <defs>
    <radialGradient id="pb-glow" cx="72%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#d4af37" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0b0b0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pb-bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#1a1408"/>
      <stop offset="55%" stop-color="#0f0d08"/>
      <stop offset="100%" stop-color="#0b0b0b"/>
    </linearGradient>
    <linearGradient id="pb-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4e3a1"/>
      <stop offset="55%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8a6a18"/>
    </linearGradient>
    <radialGradient id="pb-lnb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff4c7"/>
      <stop offset="60%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#7a5e12"/>
    </radialGradient>
    <filter id="pb-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="900" height="1200" fill="url(#pb-bg)"/>
  <rect width="900" height="1200" fill="url(#pb-glow)"/>

  <!-- faint starfield -->
  <g fill="#d4af37">
    <circle cx="120" cy="150" r="2" opacity="0.55"/>
    <circle cx="780" cy="110" r="1.6" opacity="0.45"/>
    <circle cx="820" cy="520" r="2.2" opacity="0.5"/>
    <circle cx="90" cy="720" r="1.6" opacity="0.4"/>
    <circle cx="660" cy="820" r="1.4" opacity="0.35"/>
    <circle cx="240" cy="980" r="1.8" opacity="0.45"/>
  </g>

  <!-- signal waves -->
  <g stroke="#d4af37" fill="none" stroke-width="2" stroke-dasharray="3 10" stroke-linecap="round" opacity="0.45">
    <path d="M450 430 Q 640 330 820 280"/>
    <path d="M450 430 Q 660 400 860 380"/>
    <path d="M450 430 Q 640 500 820 560"/>
  </g>

  <!-- dish -->
  <g transform="translate(450 600)">
    <!-- shadow plate -->
    <ellipse cx="12" cy="30" rx="280" ry="120" fill="#000" opacity="0.55" filter="url(#pb-soft)"/>
    <!-- outer rim -->
    <ellipse cx="0" cy="0" rx="290" ry="124" fill="none" stroke="url(#pb-gold)" stroke-width="3" opacity="0.9"/>
    <!-- inner rings -->
    <ellipse cx="0" cy="0" rx="220" ry="92" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.55"/>
    <ellipse cx="0" cy="0" rx="150" ry="62" fill="none" stroke="#d4af37" stroke-width="1.6" opacity="0.4"/>
    <ellipse cx="0" cy="0" rx="80" ry="34" fill="none" stroke="#d4af37" stroke-width="1.2" opacity="0.3"/>
    <!-- dish fill -->
    <ellipse cx="0" cy="0" rx="288" ry="122" fill="url(#pb-gold)" opacity="0.06"/>
    <!-- LNB arm -->
    <line x1="-180" y1="40" x2="0" y2="-180" stroke="url(#pb-gold)" stroke-width="3" opacity="0.85"/>
    <line x1="180" y1="40" x2="0" y2="-180" stroke="url(#pb-gold)" stroke-width="3" opacity="0.85"/>
    <line x1="0" y1="110" x2="0" y2="-180" stroke="url(#pb-gold)" stroke-width="3" opacity="0.7"/>
    <!-- LNB head -->
    <circle cx="0" cy="-188" r="16" fill="url(#pb-lnb)" stroke="#f4e3a1" stroke-width="1.5"/>
    <circle cx="0" cy="-188" r="6" fill="#fff4c7" opacity="0.9"/>
    <!-- stand -->
    <line x1="0" y1="120" x2="0" y2="300" stroke="url(#pb-gold)" stroke-width="5" opacity="0.85"/>
    <line x1="-110" y1="300" x2="110" y2="300" stroke="url(#pb-gold)" stroke-width="5" opacity="0.85" stroke-linecap="round"/>
  </g>

  <!-- horizon hint -->
  <rect x="0" y="1080" width="900" height="120" fill="#000" opacity="0.45"/>
</svg>
